[Rainmeter]
Update=1000
DefaultUpdateDivider=1
AccurateText=1

; ========================================
; CUSTOMIZABLE VARIABLES
; ========================================
[Variables]
; Resolution scaling: 1.0 = 1920x1080  |  1.11 = 1920x1200
ScaleFactor     = 1

; Font settings
FontFace        = MesloLGL Nerd Font
FontSize        = (7 * #ScaleFactor#)
FontColor       = 255,255,255,255

; Colors (R,G,B,A) — refined palette
BackgroundColor = 0,0,0,0
BorderColor     = 80,80,80,255
CPUColor        = 110,160,255,255
RAMColor        = 80,210,160,255
DiskColor       = 190,90,255,255
NetworkColor    = 255,170,50,255
UploadColor     = 255,170,50,255
SwapColor       = 170,160,60,255
GPUColor        = 200,60,120,255

; Box background colors (same RGB, alpha 20)
CPUBoxColor     = 110,160,255,20
RAMBoxColor     = 80,210,160,20
SwapBoxColor    = 170,160,60,20
DiskBoxColor    = 190,90,255,20
NetworkBoxColor = 255,170,50,20
GPUBoxColor     = 200,60,120,20

; Labels
ProcUtilLabel   = UTL
RAMLabel        = RAM
DiskCLabel      = C:
DiskDLabel      = D:
DiskIOLabel     = DIO
NetworkLabel    = NET
SwapLabel       = MPS
GPULabel        = GPU

; Dimensions
SquareSize      = (15 * #ScaleFactor#)
GraphWidth      = (58 * #ScaleFactor#)
Spacing         = (5 * #ScaleFactor#)
BarPadding      = (2 * #ScaleFactor#)
LabelWidth      = (45 * #ScaleFactor#)
LabelPadding    = (4 * #ScaleFactor#)
CornerRadius    = 3

; Expanded box dimensions
ExpandedWidth   = #GraphWidth#
ExpandedHeight  = #SquareSize#

; Glow size (1 px halo around each square / expanded box)
GlowSize        = (#SquareSize# + 2)
GlowExpandW     = (#ExpandedWidth# + 2)
GlowExpandH     = (#ExpandedHeight# + 2)

; Grid math
StepX           = (#SquareSize# + #LabelWidth# + #Spacing#)
StepY           = (#SquareSize# + #Spacing#)

; How many columns / rows are in use?
ColsUsed        = 4
RowsUsed        = 2

; Background size auto-calc
BGWidth         = (#ColsUsed# * #StepX# - #Spacing#)
BGHeight        = (#RowsUsed# * #StepY# - #Spacing#)

; Predefined slot coordinates
X_Col0          = 0
X_Col1          = #StepX#
X_Col2          = (2 * #StepX#)
X_Col3          = (3 * #StepX#)

Y_Row0          = 0
Y_Row1          = #StepY#
Y_Row2          = (2 * #StepY#)

; ========================================
; RESOURCE POSITION ASSIGNMENTS
; Row 0: UTL | GPU | RAM | MPS
; Row 1: DIO | C:  | D:  | NET
; ========================================
X_ProcUtil      = #X_Col0#
Y_ProcUtil      = #Y_Row0#

X_GPU           = #X_Col1#
Y_GPU           = #Y_Row0#

X_RAM           = #X_Col2#
Y_RAM           = #Y_Row0#

X_Swap          = #X_Col3#
Y_Swap          = #Y_Row0#

X_DiskIO        = #X_Col0#
Y_DiskIO        = #Y_Row1#

X_DiskC         = #X_Col1#
Y_DiskC         = #Y_Row1#

X_DiskD         = #X_Col2#
Y_DiskD         = #Y_Row1#

X_Network       = #X_Col3#
Y_Network       = #Y_Row1#



; ========================================
; MEASURES – SYSTEM RESOURCES
; ========================================

[MeasureProcUtil]
Measure=Plugin
Plugin=UsageMonitor
Category=Processor Information
Counter=% Processor Utility
Name=_Total
MinValue=0
MaxValue=100

[MeasureRAM]
Measure=PhysicalMemory

[MeasureDiskC]
Measure=FreeDiskSpace
Drive=C:
InvertMeasure=1

[MeasureDiskD]
Measure=FreeDiskSpace
Drive=D:
InvertMeasure=1

[MeasureNetworkIn]
Measure=NetIn
Interface=Best

[MeasureNetworkOut]
Measure=NetOut
Interface=Best

[MeasureNetworkTotal]
Measure=NetTotal
Interface=Best

[MeasureNetworkPct]
Measure=Calc
Formula=(MeasureNetworkTotal/25000000)*100
MinValue=0
MaxValue=100

[MeasureSwap]
Measure=SwapMemory

[MeasureSwapUsage]
Measure=Calc
Formula=MeasureSwap - MeasureRAM

[MeasureSwapPct]
Measure=Calc
Formula=(MeasureSwapUsage / MeasureSwap) * 100
MinValue=0
MaxValue=100

[MeasureGPUUsage]
Measure=Plugin
Plugin=UsageMonitor
Category=GPU Engine
Counter=Utilization Percentage
Instance=pid_4_luid_0x00000000_0x00012507_phys_0_eng_0_engtype_3D

[MeasureDiskIO]
Measure=Plugin
Plugin=UsageMonitor
Category=PhysicalDisk
Counter=% Disk Time
Name=_Total
MinValue=0
MaxValue=100

; ========================================
; BACKGROUND CONTAINER
; ========================================
[Background]
Meter=Shape
Shape=Rectangle 0,0,#BGWidth#,#BGHeight#,#CornerRadius#,#CornerRadius# | Fill Color #BackgroundColor# | StrokeWidth 0

; ========================================
; PROCESSOR UTILITY SQUARE & COMPONENTS
; ========================================
[ProcUtilSquare]
Meter=Shape
X=#X_ProcUtil#
Y=#Y_ProcUtil#
Shape=Rectangle 0,0,#SquareSize#,#SquareSize#,#CornerRadius#,#CornerRadius# | Fill Color #CPUBoxColor# | StrokeWidth 0.75 | Stroke Color #CPUColor#
Shape2=Rectangle -1,-1,#GlowSize#,#GlowSize#,#CornerRadius#,#CornerRadius# | Fill Color #CPUBoxColor# | StrokeWidth 0
MouseOverAction=[!SetOption ProcUtilSquareExpanded Hidden 0][!SetOption ProcUtilSquare Hidden 1][!SetOption ProcUtilGraph Hidden 0][!SetOption ProcUtilLabel Hidden 1][!UpdateMeter ProcUtilSquareExpanded][!UpdateMeter ProcUtilSquare][!UpdateMeter ProcUtilGraph][!UpdateMeter ProcUtilLabel][!Redraw]
MouseLeaveAction=[!SetOption ProcUtilSquareExpanded Hidden 1][!SetOption ProcUtilSquare Hidden 0][!SetOption ProcUtilGraph Hidden 1][!SetOption ProcUtilLabel Hidden 0][!UpdateMeter ProcUtilSquareExpanded][!UpdateMeter ProcUtilSquare][!UpdateMeter ProcUtilGraph][!UpdateMeter ProcUtilLabel][!Redraw]

[ProcUtilSquareExpanded]
Meter=Shape
X=#X_ProcUtil#
Y=#Y_ProcUtil#
Shape=Rectangle 0,0,#ExpandedWidth#,#ExpandedHeight#,#CornerRadius#,#CornerRadius# | Fill Color #CPUBoxColor# | StrokeWidth 0.75 | Stroke Color #CPUColor#
Shape2=Rectangle -1,-1,#GlowExpandW#,#GlowExpandH#,#CornerRadius#,#CornerRadius# | Fill Color #CPUBoxColor# | StrokeWidth 0
Hidden=1
MouseOverAction=[!SetOption ProcUtilSquareExpanded Hidden 0][!SetOption ProcUtilSquare Hidden 1][!SetOption ProcUtilGraph Hidden 0][!SetOption ProcUtilLabel Hidden 1][!UpdateMeter ProcUtilSquareExpanded][!UpdateMeter ProcUtilSquare][!UpdateMeter ProcUtilGraph][!UpdateMeter ProcUtilLabel][!Redraw]
MouseLeaveAction=[!SetOption ProcUtilSquareExpanded Hidden 1][!SetOption ProcUtilSquare Hidden 0][!SetOption ProcUtilGraph Hidden 1][!SetOption ProcUtilLabel Hidden 0][!UpdateMeter ProcUtilSquareExpanded][!UpdateMeter ProcUtilSquare][!UpdateMeter ProcUtilGraph][!UpdateMeter ProcUtilLabel][!Redraw]

[ProcUtilBar]
Meter=Bar
MeasureName=MeasureProcUtil
X=(#X_ProcUtil# + #BarPadding#)
Y=(#Y_ProcUtil# + #BarPadding#)
W=(#SquareSize# - 2 * #BarPadding#)
H=(#SquareSize# - 2 * #BarPadding#)
BarOrientation=Vertical
BarColor=#CPUColor#
BackgroundMode=2
SolidColor=0,0,0,0

[ProcUtilLabel]
Meter=String
X=(#X_ProcUtil# + #SquareSize# + #LabelPadding#)
Y=(#Y_ProcUtil# + (#SquareSize# - #FontSize#))
Text=#ProcUtilLabel#
FontFace=#FontFace#
FontSize=#FontSize#
FontColor=#FontColor#
StringAlign=LeftCenter
AntiAlias=1
MouseOverAction=[!SetOption ProcUtilSquareExpanded Hidden 0][!SetOption ProcUtilSquare Hidden 1][!SetOption ProcUtilGraph Hidden 0][!SetOption ProcUtilLabel Hidden 1][!UpdateMeter ProcUtilSquareExpanded][!UpdateMeter ProcUtilSquare][!UpdateMeter ProcUtilGraph][!UpdateMeter ProcUtilLabel][!Redraw]
MouseLeaveAction=[!SetOption ProcUtilSquareExpanded Hidden 1][!SetOption ProcUtilSquare Hidden 0][!SetOption ProcUtilGraph Hidden 1][!SetOption ProcUtilLabel Hidden 0][!UpdateMeter ProcUtilSquareExpanded][!UpdateMeter ProcUtilSquare][!UpdateMeter ProcUtilGraph][!UpdateMeter ProcUtilLabel][!Redraw]

[ProcUtilGraph]
Meter=Line
MeasureName=MeasureProcUtil
X=(#X_ProcUtil# + 1)
Y=(#Y_ProcUtil# + 1)
W=(#ExpandedWidth# - 2)
H=(#ExpandedHeight# - 2)
LineColor=#CPUColor#
LineWidth=2
AntiAlias=1
AutoScale=0
HorizontalLines=1
HorizontalLineColor=255,255,255,30
BackgroundMode=2
SolidColor=0,0,0,0
Hidden=1

